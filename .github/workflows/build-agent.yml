name: Build companion-app

on:
  push:
    branches: [main]
    paths:
      - 'companion-app.py'
      - 'templates/**'
      - 'static/**'
      - 'firstrun-template.sh'
      - 'requirements.txt'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Build .app bundle
        run: |
          pyinstaller \
            --windowed --onedir \
            --name companion-app \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "firstrun-template.sh:." \
            --hidden-import passlib.handlers.sha2_crypt \
            companion-app.py
      - name: Zip .app
        run: cd dist && zip -r companion-app-macos.zip companion-app.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/companion-app-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Build .exe
        run: |
          pyinstaller `
            --noconsole --onefile `
            --name companion-app `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "firstrun-template.sh;." `
            --hidden-import passlib.handlers.sha2_crypt `
            companion-app.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/companion-app.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Build Linux binary
        run: |
          pyinstaller \
            --onefile \
            --name companion-app \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "firstrun-template.sh:." \
            --hidden-import passlib.handlers.sha2_crypt \
            companion-app.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/companion-app

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename Linux binary
        run: mv artifacts/companion-app artifacts/companion-app-linux

      - name: Create/update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: CompanionPi Injector (latest)
          prerelease: true
          make_latest: false
          body: |
            Automatisch gebouwde binaries — bijgewerkt bij elke push naar `main`.

            | Bestand | Platform | Gebruik |
            |---|---|---|
            | `companion-app-macos.zip` | macOS | Pak uit → rechtermuisknop → **Open** (eenmalig voor Gatekeeper) |
            | `companion-app.exe` | Windows | Dubbelklik om te starten |
            | `companion-app-linux` | Linux x86_64 | `chmod +x companion-app-linux && ./companion-app-linux` |

            De app opent automatisch de browser op **http://localhost:7070**.
          files: |
            artifacts/companion-app-macos.zip
            artifacts/companion-app.exe
            artifacts/companion-app-linux
