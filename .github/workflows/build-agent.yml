name: Build companion-app

on:
  push:
    branches: [main]
    paths:
      - 'companion-app.py'
      - 'templates/**'
      - 'static/**'
      - 'firstrun-template.sh'
      - 'requirements.txt'
      - '.github/workflows/build-agent.yml'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Embed build date
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i '' "s|APP_BUILD_DATE.*=.*\"unknown\"|APP_BUILD_DATE = \"$BUILD_DATE\"|" companion-app.py
      - name: Build .app bundle
        run: |
          pyinstaller \
            --windowed --onedir \
            --name companion-app \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "firstrun-template.sh:." \
            --hidden-import passlib.handlers.sha2_crypt \
            companion-app.py
      - name: Zip .app
        run: cd dist && zip -r companion-app-macos.zip companion-app.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/companion-app-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Embed build date
        shell: bash
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|APP_BUILD_DATE.*=.*\"unknown\"|APP_BUILD_DATE = \"$BUILD_DATE\"|" companion-app.py
      - name: Build .exe
        run: |
          pyinstaller `
            --noconsole --onefile `
            --name companion-app `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "firstrun-template.sh;." `
            --hidden-import passlib.handlers.sha2_crypt `
            companion-app.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/companion-app.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller -r requirements.txt
      - name: Embed build date
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|APP_BUILD_DATE.*=.*\"unknown\"|APP_BUILD_DATE = \"$BUILD_DATE\"|" companion-app.py
      - name: Build Linux binary
        run: |
          pyinstaller \
            --onefile \
            --name companion-app \
            --add-data "templates:templates" \
            --add-data "static:static" \
            --add-data "firstrun-template.sh:." \
            --hidden-import passlib.handlers.sha2_crypt \
            companion-app.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/companion-app

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version and embed build date
        id: ver
        run: |
          VERSION=$(grep '^APP_VERSION' companion-app.py | cut -d'"' -f2)
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          sed -i "s|APP_BUILD_DATE.*=.*\"unknown\"|APP_BUILD_DATE = \"$BUILD_DATE\"|" companion-app.py

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rename Linux binary
        run: mv artifacts/companion-app artifacts/companion-app-linux

      - name: Delete existing latest tag (so GitHub shows current build time)
        run: git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "CompanionPi Injector v${{ steps.ver.outputs.version }}"
          prerelease: true
          make_latest: false
          body: |
            **v${{ steps.ver.outputs.version }}** — gebouwd op ${{ steps.ver.outputs.build_date }}

            | Bestand | Platform | Gebruik |
            |---|---|---|
            | `companion-app-macos.zip` | macOS | Pak uit → rechtermuisknop → **Open** (eenmalig voor Gatekeeper) |
            | `companion-app.exe` | Windows | Dubbelklik om te starten |
            | `companion-app-linux` | Linux x86_64 | `chmod +x companion-app-linux && ./companion-app-linux` |

            De app opent automatisch de browser op **http://localhost:7070**.
            Updates worden automatisch gedetecteerd vanuit de app zelf.
          files: |
            artifacts/companion-app-macos.zip
            artifacts/companion-app.exe
            artifacts/companion-app-linux
