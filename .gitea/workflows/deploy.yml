name: Deploy naar NAS - CompanionPi Injector

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: nas-companionpi

    steps:
      - name: Clone injector repo van Gitea
        run: |
          rm -rf /tmp/injector-deploy
          git clone --depth=1 http://192.168.10.11:3001/jellec/companionpi-wifi-injector.git \
            /tmp/injector-deploy

      - name: Kopieer naar stack directory
        run: |
          mkdir -p /opt/stacks/stack_companionpi/companionpi-wifi-injector
          find /opt/stacks/stack_companionpi/companionpi-wifi-injector/ -mindepth 1 \
            -not -path '*/wifi-repo-cache*' \
            -delete 2>/dev/null || true
          cp -r /tmp/injector-deploy/. \
               /opt/stacks/stack_companionpi/companionpi-wifi-injector/
          rm -rf /tmp/injector-deploy
          echo "✅ Injector broncode gekopieerd."

      - name: Docker Compose — injector rebuilden
        run: |
          cd /opt/stacks/stack_companionpi
          docker compose up -d --build injector
          echo "✅ Injector herbouwd en herstart."
