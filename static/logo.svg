<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Companion-style dark circle background -->
  <circle cx="50" cy="50" r="49" fill="#1e1e1e"/>

  <!-- WiFi arcs — top third -->
  <path d="M25 32 a35 35 0 0 1 50 0"
        stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M33 40 a24 24 0 0 1 34 0"
        stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M41 48 a13 13 0 0 1 18 0"
        stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="50" cy="54" r="3.5" fill="white"/>

  <!-- Raspberry Pi — replaces the Companion red dot (left side) -->
  <!-- Green leaves -->
  <line x1="15" y1="63" x2="12.5" y2="59" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19" y1="62" x2="19"   y2="58" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23" y1="63" x2="25.5" y2="59" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Berry circles (RPi logo pattern) -->
  <circle cx="15"  cy="68" r="4.5" fill="#bc1142"/>
  <circle cx="23"  cy="68" r="4.5" fill="#bc1142"/>
  <circle cx="19"  cy="65" r="4.5" fill="#bc1142"/>
  <circle cx="19"  cy="73" r="4.5" fill="#bc1142"/>
  <circle cx="12.5" cy="74" r="3.5" fill="#bc1142"/>
  <circle cx="25.5" cy="74" r="3.5" fill="#bc1142"/>
  <!-- Shine -->
  <circle cx="17" cy="67" r="1.5" fill="white" fill-opacity="0.25"/>

  <!-- Companion-style arrows — 4 chevrons pointing right -->
  <path d="M30 62 L52 57 L30 66" stroke="white" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <path d="M30 67 L52 66 L30 71" stroke="white" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <path d="M30 72 L52 75 L30 76" stroke="white" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <path d="M30 76 L52 84 L30 80" stroke="white" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/>

  <!-- Destination dots — 2 columns, 3 rows -->
  <circle cx="63" cy="60" r="5" fill="white"/>
  <circle cx="76" cy="60" r="5" fill="white"/>
  <circle cx="63" cy="70" r="5" fill="white"/>
  <circle cx="76" cy="70" r="5" fill="white"/>
  <circle cx="63" cy="80" r="5" fill="white"/>
  <circle cx="76" cy="80" r="5" fill="white"/>

</svg>
